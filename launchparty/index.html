<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Launch Party Reports | Scroll Media</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --shadow: #151516;
      --azure: #0c3387;
      --lucid: #cbe9ff;
      --ghost: #fafdff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--ghost);
      color: var(--shadow);
      line-height: 1.6;
      padding: 24px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    .breadcrumb {
      font-size: 14px;
      color: rgba(21, 21, 22, 0.5);
      margin-bottom: 32px;
    }
    
    .breadcrumb a {
      color: var(--azure);
      text-decoration: none;
    }
    
    .breadcrumb a:hover {
      text-decoration: underline;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 16px;
      color: rgba(21, 21, 22, 0.6);
      margin-bottom: 32px;
    }
    
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .report-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: var(--shadow);
      transition: all 0.2s;
    }
    
    .report-card:hover {
      border-color: var(--azure);
      box-shadow: 0 4px 12px rgba(12, 51, 135, 0.08);
    }
    
    .report-month {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    
    .report-date {
      font-size: 14px;
      color: rgba(21, 21, 22, 0.5);
    }
    
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: rgba(21, 21, 22, 0.5);
    }
    
    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      .report-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="/">← All Clients</a>
    </div>
    
    <h1>Launch Party</h1>
    <p class="subtitle">Monthly performance reports</p>
    
    <div class="report-grid">
      <a href="/launchparty/january2026/" class="report-card">
        <div class="report-month">January 2026</div>
        <div class="report-date">Published Feb 13, 2026</div>
      </a>
      
      <!-- Add new monthly reports here -->
    </div>
  </div>
</body>
</html>
