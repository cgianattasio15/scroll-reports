  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--shadow:#151516;--azure:#0c3387;--lucid:#cbe9ff;--hl:#e2ed7a;--porcelain:#f2f3f4;--ghost:#fafdff;--white:#fff;--border:rgba(21,21,22,.08);--muted:rgba(21,21,22,.5)}
    body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--ghost);color:var(--shadow);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
    .topbar{background:var(--shadow);padding:18px 24px;display:flex;align-items:center}
    .topbar img{height:30px;width:auto;display:block}
    .hero{background:var(--shadow);padding:44px 24px 64px;position:relative;overflow:hidden}
    .hero::before{content:"";position:absolute;top:-100px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(12,51,135,.18) 0%,transparent 70%);pointer-events:none}
    .hero-inner{max-width:900px;margin:0 auto;position:relative;z-index:1}
    .hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:12px}
    .hero h1{font-size:clamp(26px,4vw,42px);font-weight:800;color:#fff;letter-spacing:-1.2px;line-height:1.06;margin-bottom:8px}
    .hero-sub{font-size:15px;color:rgba(255,255,255,.42)}
    .main{max-width:900px;margin:0 auto;padding:48px 24px}
    .sec-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--azure);margin-bottom:20px}
    .report-grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:560px){.report-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:840px){.report-grid{grid-template-columns:repeat(3,1fr)}}
    .report-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:24px;text-decoration:none;color:var(--shadow);display:block;transition:border-color .2s,box-shadow .2s,transform .18s}
    .report-card:hover{border-color:var(--azure);box-shadow:0 6px 20px rgba(12,51,135,.1);transform:translateY(-2px)}
    .report-score{display:inline-flex;align-items:center;gap:6px;background:rgba(12,51,135,.07);color:var(--azure);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:14px}
    .report-month{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
    .report-date{font-size:13px;color:var(--muted);margin-bottom:18px}
    .report-cta{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--azure)}
    .report-cta svg{width:13px;height:13px;transition:transform .15s}
    .report-card:hover .report-cta svg{transform:translateX(3px)}
    .footer{background:var(--shadow);padding:32px 24px;text-align:center;margin-top:48px}
    .footer img{height:26px;width:auto;display:block;margin:0 auto 10px}
    .footer p{font-size:12px;color:rgba(255,255,255,.25)}
  </style>
</head>
