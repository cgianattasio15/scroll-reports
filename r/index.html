<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | Scroll Media</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --shadow: #151516;
      --azure: #0c3387;
      --ghost: #fafdff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--ghost);
      color: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    
    .loading {
      max-width: 400px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 24px;
      border: 3px solid rgba(12, 51, 135, 0.1);
      border-top-color: var(--azure);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    p {
      font-size: 16px;
      color: rgba(21, 21, 22, 0.6);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h1>Loading Your Report</h1>
    <p>Redirecting you to your performance report...</p>
  </div>
  
  <script src="/js/token-router.js"></script>
</body>
</html>
