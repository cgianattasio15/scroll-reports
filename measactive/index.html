<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEAS Active – Performance Reports | Scroll Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --shadow:#151516;
      --azure:#0c3387;
      --lucid:#cbe9ff;
      --hl:#e2ed7a;
      --ink-mid:rgba(255,255,255,0.65);
      --ink-light:rgba(255,255,255,0.35);
      --porcelain:#f2f3f4;
      --ghost:#fafdff;
      --border:rgba(21,21,22,0.08);
      --text:#151516;
      --text-muted:#5a5a5c;
      --green:#10b981;
      --amber:#f59e0b;
      --red:#ef4444;
      --purple:#7c3aed;
    }
    body{font-family:'Source Sans 3',sans-serif;background:var(--ghost);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding:2rem 1.5rem}
    
    .container{max-width:1100px;margin:0 auto}
    
    .header{background:linear-gradient(135deg,#151516 0%,#1a1a1c 100%);color:white;padding:2.5rem;border-radius:12px;margin-bottom:3rem;position:relative;overflow:hidden}
    .header::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(12,51,135,.18),transparent 70%);border-radius:50%}
    .header-inner{position:relative;z-index:1}
    .back-link{display:inline-flex;align-items:center;gap:.5rem;color:var(--ink-mid);text-decoration:none;font-size:.875rem;margin-bottom:1.5rem;transition:color .2s}
    .back-link:hover{color:white}
    .back-link::before{content:'←';font-size:1rem}
    
    h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:.75rem}
    .handle{font-size:1.125rem;color:var(--lucid);margin-bottom:1.25rem}
    
    .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem}
    .meta-item{display:flex;flex-direction:column;gap:.25rem}
    .meta-label{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light)}
    .meta-value{font-size:.9375rem;color:white;line-height:1.4}
    
    .reports-section{margin-top:3rem}
    .section-title{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:1.5rem}
    
    .reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
    
    .report-card{background:white;border:1px solid var(--border);border-radius:10px;padding:2rem;transition:all .3s;position:relative;overflow:hidden}
    .report-card:hover{box-shadow:0 8px 24px rgba(21,21,22,.12);transform:translateY(-2px)}
    .report-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--azure),#1a4fc4)}
    
    .report-month{font-size:.8125rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azure);margin-bottom:.75rem}
    
    .report-score{font-size:3rem;font-weight:700;color:var(--text);line-height:1;margin-bottom:1rem}
    .report-score span{font-size:1.25rem;color:var(--text-muted);font-weight:400}
    
    .badges{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
    .badge{font-size:.6875rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.375rem .75rem;border-radius:4px}
    .badge.exceeding{background:rgba(124,58,237,.1);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
    .badge.on-track{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.2)}
    .badge.watch{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.2)}
    
    .report-link{display:inline-flex;align-items:center;gap:.5rem;color:var(--azure);text-decoration:none;font-weight:600;font-size:.9375rem;transition:gap .2s}
    .report-link:hover{gap:.75rem}
    .report-link::after{content:'→'}
    
    @media (max-width: 768px){
      body{padding:1.5rem 1rem}
      .header{padding:2rem 1.5rem}
      h1{font-size:2rem}
      .meta-grid{grid-template-columns:1fr 1fr}
      .reports-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-inner">
        <a href="/" class="back-link">Back to Dashboard</a>
        <h1>MEAS Active</h1>
        <div class="handle">@meas_active</div>
        
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Niche</div>
            <div class="meta-value">Jewelry / Retail</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Subniche</div>
            <div class="meta-value">Fashion-Forward Performance Activewear</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Package</div>
            <div class="meta-value">Signature</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Stage</div>
            <div class="meta-value">Rise</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Account Manager</div>
            <div class="meta-value">Riley Walker</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Client Since</div>
            <div class="meta-value">May 2025</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="reports-section">
      <h2 class="section-title">Performance Reports</h2>
      
      <div class="reports-grid">
        <!-- January 2026 Report -->
        <div class="report-card">
          <div class="report-month">January 2026</div>
          <div class="report-score">8.6<span>/10</span></div>
          <div class="badges">
            <span class="badge exceeding">4 Exceeding</span>
            <span class="badge on-track">4 On Track</span>
            <span class="badge watch">4 Watch</span>
          </div>
          <a href="/measactive/january2026/" class="report-link">View Full Report</a>
        </div>
        <!-- Add report cards here as monthly reports are published -->
      </div>
    </div>
  </div>
</body>
</html>
